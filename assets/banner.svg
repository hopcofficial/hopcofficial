<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0C"/>
      <stop offset="100%" stop-color="#131316"/>
    </linearGradient>
    <linearGradient id="crimsonFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C81E3A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C81E3A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C81E3A" stop-opacity="0"/>
    </linearGradient>
    <filter id="scanlineBlur"><feGaussianBlur stdDeviation="0.3"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="faceTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A1620" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C81E3A" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17171A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0A0A0C" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241A0E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B8933E" stop-opacity="0.3"/>
    </linearGradient>

    <clipPath id="line1clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="640" dur="0.9s" begin="0.2s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line2clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="640" dur="1.1s" begin="1.3s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line3clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="640" dur="1s" begin="2.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line4clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="560" dur="0.8s" begin="3.8s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1000" height="280" fill="url(#bg)"/>

  <g opacity="0.05" filter="url(#scanlineBlur)">
    <rect width="1000" height="1" y="0" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="6" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="12" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="18" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="24" fill="#EDEAE3"/>
  </g>

  <circle cx="24" cy="17" r="5" fill="#C81E3A">
    <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="40" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B6B72" letter-spacing="1.5">HOPCOFFICIAL_TERMINAL — SESSION ACTIVE</text>
  <text x="960" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B6B72" text-anchor="end">v2.2</text>
  <line x1="0" y1="34" x2="1000" y2="34" stroke="url(#crimsonFade)" stroke-width="1"/>

  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="20">
    <g clip-path="url(#line1clip)">
      <text x="34" y="86" fill="#6B6B72">&gt; connecting to </text>
      <text x="204" y="86" fill="#EDEAE3" font-weight="600">peyman / hopcofficial</text>
    </g>

    <g clip-path="url(#line2clip)">
      <text x="34" y="128" fill="#6B6B72">&gt; access granted</text>
    </g>
    <g clip-path="url(#line2clip)">
      <text x="34" y="152" fill="#C81E3A" font-weight="700" font-size="16">WEB3 CONTENT CREATOR</text>
      <text x="34" y="174" fill="#B8933E" font-weight="700" font-size="16">DISCORD &amp; TG DEV</text>
    </g>

    <g clip-path="url(#line3clip)">
      <text x="34" y="206" fill="#6B6B72" font-size="16">&gt; modules: raidlines_bot · ZAX</text>
    </g>

    <g clip-path="url(#line4clip)">
      <text x="34" y="230" fill="#6B6B72" font-size="16">&gt; status: </text>
      <text x="120" y="230" fill="#C81E3A" font-weight="700" font-size="16" letter-spacing="1">RAIDING THE TIMELINE</text>
      <rect x="410" y="216" width="10" height="18" fill="#C81E3A">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <line x1="660" y1="50" x2="660" y2="240" stroke="#1A1A1E" stroke-width="1"/>

  <g transform="translate(820,150)">
    <ellipse cx="0" cy="0" rx="150" ry="42" fill="none" stroke="#1A1A1E" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="150" ry="42" fill="none" stroke="#C81E3A" stroke-width="1" stroke-dasharray="6 10" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </ellipse>

    <g filter="url(#glow)">
      <polygon points="0,-70 62,-35 0,0 -62,-35" fill="url(#faceTop)" stroke="#C81E3A" stroke-width="1.2"/>
      <polygon points="-62,-35 0,0 0,70 -62,35" fill="url(#faceLeft)" stroke="#3F3F44" stroke-width="1"/>
      <polygon points="62,-35 0,0 0,70 62,35" fill="url(#faceRight)" stroke="#B8933E" stroke-width="1.2"/>

      <line x1="0" y1="-70" x2="0" y2="0" stroke="#EDEAE3" stroke-width="0.6" opacity="0.35"/>
      <line x1="-62" y1="-35" x2="62" y2="-35" stroke="#EDEAE3" stroke-width="0.6" opacity="0.25"/>
      <line x1="-62" y1="0" x2="62" y2="0" stroke="#EDEAE3" stroke-width="0.5" opacity="0.2"/>
    </g>

    <circle cx="0" cy="-5" r="5" fill="#EDEAE3">
      <animate attributeName="r" values="4;7;4" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="0" cy="-70" r="3" fill="#C81E3A"/>
    <circle cx="62" cy="-35" r="3" fill="#B8933E"/>
    <circle cx="-62" cy="-35" r="3" fill="#B8933E"/>
    <circle cx="62" cy="35" r="3" fill="#C81E3A"/>
    <circle cx="-62" cy="35" r="3" fill="#C81E3A"/>
    <circle cx="0" cy="70" r="3" fill="#EDEAE3"/>

    <circle cx="-110" cy="-60" r="1.6" fill="#C81E3A">
      <animate attributeName="cy" values="-60;-90;-60" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="60" r="1.6" fill="#B8933E">
      <animate attributeName="cy" values="60;90;60" dur="5.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="-80" r="1.4" fill="#EDEAE3">
      <animate attributeName="cx" values="90;115;90" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="6s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="105" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#3F3F44" letter-spacing="2">compiling_brand.exe</text>
  </g>

  <line x1="0" y1="254" x2="1000" y2="254" stroke="#1A1A1E" stroke-width="1"/>
  <text x="34" y="270" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#3F3F44" letter-spacing="1">ISTANBUL · TR — BUILDING IN PUBLIC SINCE THE BULL RAN</text>
</svg>
