<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0C"/>
      <stop offset="100%" stop-color="#131316"/>
    </linearGradient>
    <linearGradient id="crimsonFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C81E3A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C81E3A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C81E3A" stop-opacity="0"/>
    </linearGradient>
    <filter id="scanlineBlur"><feGaussianBlur stdDeviation="0.3"/></filter>
    <clipPath id="line1clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="640" dur="0.9s" begin="0.2s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line2clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="760" dur="1.1s" begin="1.3s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line3clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="700" dur="1s" begin="2.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line4clip">
      <rect x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="560" dur="0.8s" begin="3.8s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- ambient scanlines -->
  <g opacity="0.05" filter="url(#scanlineBlur)">
    <rect width="900" height="1" y="0" fill="#EDEAE3"/>
    <rect width="900" height="1" y="6" fill="#EDEAE3"/>
    <rect width="900" height="1" y="12" fill="#EDEAE3"/>
    <rect width="900" height="1" y="18" fill="#EDEAE3"/>
    <rect width="900" height="1" y="24" fill="#EDEAE3"/>
  </g>
  <g opacity="0.035">
    <rect width="900" height="280" fill="transparent"/>
    <rect x="0" y="0" width="900" height="280" fill="url(#bg)"/>
  </g>

  <!-- top status bar -->
  <rect x="0" y="0" width="900" height="34" fill="#0000000"/>
  <circle cx="24" cy="17" r="5" fill="#C81E3A">
    <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="40" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B6B72" letter-spacing="1.5">HOPCOFFICIAL_TERMINAL — SESSION ACTIVE</text>
  <text x="860" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B6B72" text-anchor="end">v2.1</text>
  <line x1="0" y1="34" x2="900" y2="34" stroke="url(#crimsonFade)" stroke-width="1"/>

  <!-- terminal lines -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="21">
    <g clip-path="url(#line1clip)">
      <text x="34" y="86" fill="#6B6B72">&gt; connecting to </text>
      <text x="204" y="86" fill="#EDEAE3" font-weight="600">peyman / hopcofficial</text>
    </g>

    <g clip-path="url(#line2clip)">
      <text x="34" y="128" fill="#6B6B72">&gt; access granted — </text>
      <text x="234" y="128" fill="#C81E3A" font-weight="700">WEB3 CONTENT CREATOR</text>
      <text x="520" y="128" fill="#6B6B72"> // </text>
      <text x="548" y="128" fill="#B8933E" font-weight="700">DISCORD &amp; TG DEV</text>
    </g>

    <g clip-path="url(#line3clip)">
      <text x="34" y="170" fill="#6B6B72">&gt; loading modules: </text>
      <text x="244" y="170" fill="#EDEAE3">raidlines_bot · ZAX · content_engine</text>
    </g>

    <g clip-path="url(#line4clip)">
      <text x="34" y="212" fill="#6B6B72">&gt; status: </text>
      <text x="150" y="212" fill="#C81E3A" font-weight="700" letter-spacing="1">RAIDING THE TIMELINE</text>
      <rect x="530" y="196" width="12" height="22" fill="#C81E3A">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <line x1="0" y1="254" x2="900" y2="254" stroke="#1A1A1E" stroke-width="1"/>
  <text x="34" y="270" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#3F3F44" letter-spacing="1">ISTANBUL · TR — BUILDING IN PUBLIC SINCE THE BULL RAN</text>
</svg>
