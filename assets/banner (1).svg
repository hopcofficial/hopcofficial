<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0C"/>
      <stop offset="100%" stop-color="#131316"/>
    </linearGradient>
    <linearGradient id="crimsonFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C81E3A" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C81E3A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C81E3A" stop-opacity="0"/>
    </linearGradient>
    <filter id="scanlineBlur"><feGaussianBlur stdDeviation="0.3"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>

    <linearGradient id="faceTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A1620" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C81E3A" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="faceLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17171A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0A0A0C" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241A0E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#B8933E" stop-opacity="0.35"/>
    </linearGradient>

    <clipPath id="helloClip">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" from="0" to="560" dur="1.1s" begin="0.2s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line2clip">
      <rect x="0" y="0" width="0" height="20">
        <animate attributeName="width" from="0" to="640" dur="0.8s" begin="1.5s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line3clip">
      <rect x="0" y="0" width="0" height="20">
        <animate attributeName="width" from="0" to="500" dur="0.7s" begin="2.4s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <clipPath id="line4clip">
      <rect x="0" y="0" width="0" height="20">
        <animate attributeName="width" from="0" to="460" dur="0.6s" begin="3.2s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>

    <path id="orbitPath" d="M 150,0 A 150,42 0 1,1 -150,0 A 150,42 0 1,1 150,0"/>
  </defs>

  <rect width="1000" height="300" fill="url(#bg)"/>

  <g opacity="0.05" filter="url(#scanlineBlur)">
    <rect width="1000" height="1" y="0" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="6" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="12" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="18" fill="#EDEAE3"/>
    <rect width="1000" height="1" y="24" fill="#EDEAE3"/>
  </g>

  <circle cx="24" cy="17" r="5" fill="#C81E3A">
    <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="40" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B6B72" letter-spacing="1.5">HOPCOFFICIAL_TERMINAL — SESSION ACTIVE</text>
  <text x="960" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B6B72" text-anchor="end">v3.0</text>
  <line x1="0" y1="34" x2="1000" y2="34" stroke="url(#crimsonFade)" stroke-width="1"/>

  <!-- HELLO headline with glitch flicker -->
  <g clip-path="url(#helloClip)">
    <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="34" font-weight="700">
      <text x="34" y="98" fill="#B8933E" opacity="0.55">
        Hello, welcome to my profile
        <animate attributeName="x" values="34;31;36;34" dur="6s" begin="2s" repeatCount="indefinite"/>
      </text>
      <text x="34" y="98" fill="#C81E3A" opacity="0.55">
        Hello, welcome to my profile
        <animate attributeName="x" values="34;37;32;34" dur="6s" begin="2s" repeatCount="indefinite"/>
      </text>
      <text x="34" y="98" fill="#EDEAE3">
        Hello, welcome to my profile
        <animate attributeName="opacity" values="1;1;0.85;1;1;0.9;1" dur="6s" begin="2s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
  <rect x="596" y="72" width="14" height="30" fill="#C81E3A" clip-path="url(#helloClip)">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="1.3s" repeatCount="indefinite"/>
  </rect>

  <!-- secondary terminal lines -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="15">
    <g clip-path="url(#line2clip)">
      <text x="34" y="140" fill="#6B6B72">&gt; access granted — </text>
      <text x="204" y="140" fill="#C81E3A" font-weight="700">WEB3 CREATOR</text>
      <text x="330" y="140" fill="#6B6B72"> // </text>
      <text x="356" y="140" fill="#B8933E" font-weight="700">BOT DEV</text>
    </g>
    <g clip-path="url(#line3clip)">
      <text x="34" y="168" fill="#6B6B72">&gt; modules: raidlines_bot · ZAX · content_engine</text>
    </g>
    <g clip-path="url(#line4clip)">
      <text x="34" y="196" fill="#6B6B72">&gt; status: </text>
      <text x="120" y="196" fill="#C81E3A" font-weight="700" letter-spacing="1">RAIDING THE TIMELINE</text>
      <rect x="400" y="182" width="9" height="16" fill="#C81E3A">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <line x1="660" y1="50" x2="660" y2="260" stroke="#1A1A1E" stroke-width="1"/>

  <!-- ISOMETRIC CENTERPIECE — auto-playing, no hover needed -->
  <g transform="translate(825,160)">

    <ellipse cx="0" cy="0" rx="155" ry="44" fill="none" stroke="#1A1A1E" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="155" ry="44" fill="none" stroke="#C81E3A" stroke-width="1" stroke-dasharray="5 9" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </ellipse>

    <!-- comet racing around the ring continuously -->
    <circle r="3.2" fill="#EDEAE3" filter="url(#softGlow)">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#orbitPath"/>
      </animateMotion>
    </circle>

    <!-- floating / bobbing wrapper -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0; 0,6; 0,0" dur="4.5s" repeatCount="indefinite"/>

      <!-- turntable illusion: scaleX oscillates through 0 to fake a spinning cube -->
      <g filter="url(#glow)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="1,1; 0.15,1; -1,1; -0.15,1; 1,1" keyTimes="0;0.25;0.5;0.75;1" dur="7s" repeatCount="indefinite"/>
          <polygon points="0,-70 62,-35 0,0 -62,-35" fill="url(#faceTop)" stroke="#C81E3A" stroke-width="1.3"/>
          <polygon points="-62,-35 0,0 0,70 -62,35" fill="url(#faceLeft)" stroke="#3F3F44" stroke-width="1"/>
          <polygon points="62,-35 0,0 0,70 62,35" fill="url(#faceRight)" stroke="#B8933E" stroke-width="1.3"/>
          <line x1="0" y1="-70" x2="0" y2="0" stroke="#EDEAE3" stroke-width="0.6" opacity="0.35"/>
          <line x1="-62" y1="-35" x2="62" y2="-35" stroke="#EDEAE3" stroke-width="0.6" opacity="0.25"/>
          <line x1="-62" y1="0" x2="62" y2="0" stroke="#EDEAE3" stroke-width="0.5" opacity="0.2"/>
        </g>
      </g>

      <circle cx="0" cy="-5" r="5" fill="#EDEAE3">
        <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>

      <circle cx="0" cy="-70" r="3" fill="#C81E3A"/>
      <circle cx="62" cy="-35" r="3" fill="#B8933E"/>
      <circle cx="-62" cy="-35" r="3" fill="#B8933E"/>
      <circle cx="62" cy="35" r="3" fill="#C81E3A"/>
      <circle cx="-62" cy="35" r="3" fill="#C81E3A"/>
      <circle cx="0" cy="70" r="3" fill="#EDEAE3"/>
    </g>

    <!-- small satellite shard orbiting on its own path -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
      <polygon points="118,0 128,-6 138,0 128,6" fill="#B8933E" opacity="0.8"/>
    </g>

    <!-- drifting particles -->
    <circle cx="-115" cy="-65" r="1.6" fill="#C81E3A">
      <animate attributeName="cy" values="-65;-95;-65" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="125" cy="65" r="1.6" fill="#B8933E">
      <animate attributeName="cy" values="65;95;65" dur="5.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="5.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="-85" r="1.4" fill="#EDEAE3">
      <animate attributeName="cx" values="95;120;95" dur="5.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="5.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-95" cy="85" r="1.4" fill="#EDEAE3">
      <animate attributeName="cx" values="-95;-120;-95" dur="5.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="5.4s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="115" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" fill="#3F3F44" letter-spacing="2">compiling_brand.exe</text>
  </g>

  <line x1="0" y1="274" x2="1000" y2="274" stroke="#1A1A1E" stroke-width="1"/>
  <text x="34" y="290" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" fill="#3F3F44" letter-spacing="1">ISTANBUL · TR — BUILDING IN PUBLIC SINCE THE BULL RAN</text>
</svg>
